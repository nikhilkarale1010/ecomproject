<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVA — Modern Store</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #111;
    --chalk: #f5f3ee;
    --accent: #e8441a;
    --mid: #888;
    --card-bg: #fff;
    --border: #e0ddd7;
  }

  body {
    background: var(--chalk);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem;
    height: 58px;
    background: var(--chalk);
    border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: .05em; color: var(--ink); }
  .nav-right { display: flex; align-items: center; gap: 1.6rem; }
  .nav-link { color: var(--mid); text-decoration: none; font-size: .85rem; letter-spacing: .04em; text-transform: uppercase; transition: color .2s; }
  .nav-link:hover { color: var(--ink); }
  .cart-btn {
    position: relative; cursor: pointer;
    background: var(--ink); color: var(--chalk);
    border: none; border-radius: 2px;
    padding: .45rem 1rem; font-family: inherit; font-size: .85rem;
    letter-spacing: .04em; text-transform: uppercase;
    display: flex; align-items: center; gap: .5rem;
    transition: background .2s;
  }
  .cart-btn:hover { background: var(--accent); }
  .cart-count {
    background: var(--accent); color: #fff;
    border-radius: 50%; width: 18px; height: 18px;
    font-size: .7rem; display: flex; align-items: center; justify-content: center;
    font-weight: 500;
  }

  /* ── HERO ── */
  .hero {
    display: grid; grid-template-columns: 1fr 1fr;
    min-height: 420px;
    overflow: hidden;
  }
  .hero-text {
    padding: 4rem 3rem;
    display: flex; flex-direction: column; justify-content: center;
  }
  .hero-tag { font-size: .75rem; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: .8rem; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 6vw, 5.5rem); line-height: 1; color: var(--ink); margin-bottom: 1rem; }
  .hero-sub { color: var(--mid); max-width: 340px; margin-bottom: 2rem; }
  .btn-primary {
    display: inline-block; background: var(--accent); color: #fff;
    padding: .75rem 2rem; border-radius: 2px;
    font-size: .85rem; letter-spacing: .06em; text-transform: uppercase;
    text-decoration: none; width: fit-content;
    transition: opacity .2s;
    cursor: pointer; border: none; font-family: inherit;
  }
  .btn-primary:hover { opacity: .85; }
  .hero-image {
    background: #d9d5cc;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .hero-image svg { width: 60%; opacity: .35; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex; gap: .5rem; align-items: center;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .filter-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--mid); margin-right: .5rem; }
  .filter-chip {
    padding: .35rem .9rem; border-radius: 20px;
    border: 1px solid var(--border);
    font-size: .8rem; cursor: pointer; white-space: nowrap;
    background: transparent; font-family: inherit; color: var(--ink);
    transition: all .15s;
  }
  .filter-chip:hover, .filter-chip.active { background: var(--ink); color: var(--chalk); border-color: var(--ink); }

  /* ── SEARCH ── */
  .search-wrap {
    padding: 1rem 2rem 0;
  }
  .search-input {
    width: 100%; max-width: 360px;
    padding: .55rem 1rem; border: 1px solid var(--border);
    border-radius: 2px; font-family: inherit; font-size: .9rem;
    background: var(--card-bg); color: var(--ink);
    outline: none; transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--ink); }

  /* ── GRID ── */
  .grid-section { padding: 1.5rem 2rem 3rem; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .04em; margin-bottom: 1.2rem; }
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.2rem;
  }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow .2s, transform .2s;
    display: flex; flex-direction: column;
    animation: fadeUp .4s ease both;
  }
  .card:hover { box-shadow: 0 8px 28px rgba(0,0,0,.1); transform: translateY(-3px); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  .card-img {
    aspect-ratio: 1/1;
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem;
    background: #f0ede7;
    position: relative; overflow: hidden;
  }
  .badge {
    position: absolute; top: .6rem; left: .6rem;
    background: var(--accent); color: #fff;
    font-size: .65rem; letter-spacing: .08em; text-transform: uppercase;
    padding: .2rem .5rem; border-radius: 2px;
  }
  .card-body { padding: .9rem 1rem 1rem; flex: 1; display: flex; flex-direction: column; }
  .card-cat { font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: var(--mid); margin-bottom: .25rem; }
  .card-name { font-size: .95rem; font-weight: 500; margin-bottom: .5rem; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .card-price { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; letter-spacing: .03em; }
  .old-price { text-decoration: line-through; color: var(--mid); font-size: .85rem; margin-right: .3rem; font-family: 'DM Sans'; }
  .add-btn {
    background: var(--ink); color: var(--chalk);
    border: none; border-radius: 2px;
    padding: .4rem .8rem; font-size: .75rem;
    cursor: pointer; font-family: inherit; letter-spacing: .05em; text-transform: uppercase;
    transition: background .15s;
  }
  .add-btn:hover { background: var(--accent); }

  /* ── CART DRAWER ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 360px;
    background: var(--chalk); z-index: 201;
    transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    border-left: 1px solid var(--border);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
  }
  .drawer-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; }
  .close-btn { background: none; border: none; cursor: pointer; font-size: 1.4rem; color: var(--mid); }
  .drawer-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
  .empty-msg { color: var(--mid); font-size: .9rem; margin-top: 2rem; text-align: center; }
  .cart-item {
    display: flex; gap: 1rem; align-items: flex-start;
    padding: .9rem 0; border-bottom: 1px solid var(--border);
  }
  .ci-emoji { font-size: 2.2rem; background: #f0ede7; border-radius: 4px; padding: .4rem .6rem; }
  .ci-info { flex: 1; }
  .ci-name { font-weight: 500; font-size: .9rem; }
  .ci-cat { font-size: .75rem; color: var(--mid); }
  .ci-qty { display: flex; align-items: center; gap: .5rem; margin-top: .4rem; }
  .qty-btn { width: 22px; height: 22px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: .9rem; border-radius: 2px; display: flex; align-items:center; justify-content:center; }
  .qty-btn:hover { background: var(--ink); color: var(--chalk); border-color: var(--ink); }
  .ci-price { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; white-space: nowrap; }
  .remove-btn { background: none; border: none; color: var(--mid); cursor: pointer; font-size: .8rem; margin-top: .3rem; }
  .remove-btn:hover { color: var(--accent); }
  .drawer-footer { padding: 1.2rem 1.5rem; border-top: 1px solid var(--border); }
  .subtotal-row { display: flex; justify-content: space-between; margin-bottom: 1rem; }
  .subtotal-label { font-size: .85rem; text-transform: uppercase; letter-spacing: .06em; color: var(--mid); }
  .subtotal-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; }
  .checkout-btn {
    width: 100%; padding: .9rem; background: var(--accent);
    color: #fff; border: none; border-radius: 2px;
    font-family: inherit; font-size: .9rem; letter-spacing: .06em;
    text-transform: uppercase; cursor: pointer; transition: opacity .2s;
  }
  .checkout-btn:hover { opacity: .85; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--chalk);
    padding: .6rem 1.4rem; border-radius: 2px;
    font-size: .85rem; letter-spacing: .04em;
    opacity: 0; transition: all .3s; pointer-events: none; z-index: 300;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex; justify-content: space-between; align-items: center;
    font-size: .8rem; color: var(--mid);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .hero { grid-template-columns: 1fr; }
    .hero-image { display: none; }
    .drawer { width: 100%; }
    .hero-text { padding: 2.5rem 1.5rem; }
    .grid-section { padding: 1rem 1rem 2rem; }
    .filter-bar { padding: .8rem 1rem; }
    nav { padding: 0 1rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <span class="logo">MOVA</span>
  <div class="nav-right">
    <a href="#" class="nav-link">New</a>
    <a href="#" class="nav-link">About</a>
    <button class="cart-btn" onclick="toggleCart()">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <p class="hero-tag">Summer Collection 2026</p>
    <h1 class="hero-title">Crafted<br>for the<br>Bold</h1>
    <p class="hero-sub">Timeless pieces made for those who move through the world with intention.</p>
    <button class="btn-primary" onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})">Shop Now</button>
  </div>
  <div class="hero-image">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="80" fill="none" stroke="#111" stroke-width="2"/>
      <circle cx="100" cy="100" r="50" fill="none" stroke="#111" stroke-width="2"/>
      <line x1="20" y1="100" x2="180" y2="100" stroke="#111" stroke-width="2"/>
      <line x1="100" y1="20" x2="100" y2="180" stroke="#111" stroke-width="2"/>
    </svg>
  </div>
</section>

<!-- SEARCH -->
<div class="search-wrap">
  <input class="search-input" type="text" placeholder="Search products…" id="searchInput" oninput="renderProducts()">
</div>

<!-- FILTER -->
<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-chip active" onclick="setFilter('All',this)">All</button>
  <button class="filter-chip" onclick="setFilter('Clothing',this)">Clothing</button>
  <button class="filter-chip" onclick="setFilter('Accessories',this)">Accessories</button>
  <button class="filter-chip" onclick="setFilter('Footwear',this)">Footwear</button>
  <button class="filter-chip" onclick="setFilter('Electronics',this)">Electronics</button>
</div>

<!-- PRODUCTS -->
<section class="grid-section" id="shop">
  <h2 class="section-title">Products</h2>
  <div class="product-grid" id="productGrid"></div>
</section>

<!-- FOOTER -->
<footer>
  <span>© 2026 MOVA Store</span>
  <span>Free shipping on orders over ₹999</span>
</footer>

<!-- CART DRAWER -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">Your Cart</span>
    <button class="close-btn" onclick="toggleCart()">✕</button>
  </div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="drawer-footer" id="drawerFooter" style="display:none">
    <div class="subtotal-row">
      <span class="subtotal-label">Subtotal</span>
      <span class="subtotal-val" id="subtotalVal">₹0</span>
    </div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const PRODUCTS = [
  { id:1, name:'Classic Linen Shirt', cat:'Clothing',     price:1299, emoji:'👕', badge:'New'  },
  { id:2, name:'Leather Belt',         cat:'Accessories',  price:799,  emoji:'👜', badge:null   },
  { id:3, name:'Canvas Sneakers',      cat:'Footwear',     price:2499, emoji:'👟', badge:'Sale', oldPrice:2999 },
  { id:4, name:'Wireless Earbuds',     cat:'Electronics',  price:3499, emoji:'🎧', badge:'Hot'  },
  { id:5, name:'Merino Wool Tee',      cat:'Clothing',     price:1599, emoji:'🧥', badge:null   },
  { id:6, name:'Leather Watch',        cat:'Accessories',  price:4999, emoji:'⌚', badge:'New'  },
  { id:7, name:'Trail Runners',        cat:'Footwear',     price:3199, emoji:'🥾', badge:null   },
  { id:8, name:'Smart Speaker',        cat:'Electronics',  price:2799, emoji:'🔊', badge:'Sale', oldPrice:3499 },
  { id:9, name:'Slim Chinos',          cat:'Clothing',     price:1899, emoji:'👖', badge:null   },
  { id:10,name:'Sunglasses',           cat:'Accessories',  price:1299, emoji:'🕶️', badge:'Hot'  },
  { id:11,name:'Running Shoes',        cat:'Footwear',     price:2899, emoji:'👟', badge:null   },
  { id:12,name:'Portable Charger',     cat:'Electronics',  price:1499, emoji:'🔋', badge:null   },
];

let cart = [];
let activeFilter = 'All';

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}

function renderProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('productGrid');
  const filtered = PRODUCTS.filter(p => {
    const matchCat = activeFilter === 'All' || p.cat === activeFilter;
    const matchQ = p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  if (!filtered.length) { grid.innerHTML = '<p style="color:var(--mid);padding:1rem 0">No products found.</p>'; return; }
  grid.innerHTML = filtered.map((p, i) => `
    <div class="card" style="animation-delay:${i*0.05}s">
      <div class="card-img">
        ${p.badge ? `<span class="badge">${p.badge}</span>` : ''}
        ${p.emoji}
      </div>
      <div class="card-body">
        <div class="card-cat">${p.cat}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-footer">
          <div>
            ${p.oldPrice ? `<span class="old-price">₹${p.oldPrice.toLocaleString()}</span>` : ''}
            <span class="card-price">₹${p.price.toLocaleString()}</span>
          </div>
          <button class="add-btn" onclick="addToCart(${p.id})">+ Add</button>
        </div>
      </div>
    </div>
  `).join('');
}

function addToCart(id) {
  const p = PRODUCTS.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...p, qty: 1 });
  updateCartUI();
  showToast(`${p.emoji} ${p.name} added to cart`);
}

function removeFromCart(id) {
  cart = cart.filter(x => x.id !== id);
  updateCartUI();
}

function changeQty(id, delta) {
  const item = cart.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeFromCart(id);
  else updateCartUI();
}

function updateCartUI() {
  const total = cart.reduce((s,x) => s + x.qty, 0);
  document.getElementById('cartCount').textContent = total;

  const items = document.getElementById('drawerItems');
  const footer = document.getElementById('drawerFooter');

  if (!cart.length) {
    items.innerHTML = '<p class="empty-msg">Your cart is empty.</p>';
    footer.style.display = 'none';
    return;
  }

  items.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="ci-emoji">${item.emoji}</div>
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-cat">${item.cat}</div>
        <div class="ci-qty">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span>${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
        </div>
        <button class="remove-btn" onclick="removeFromCart(${item.id})">Remove</button>
      </div>
      <div class="ci-price">₹${(item.price * item.qty).toLocaleString()}</div>
    </div>
  `).join('');

  const subtotal = cart.reduce((s,x) => s + x.price * x.qty, 0);
  document.getElementById('subtotalVal').textContent = '₹' + subtotal.toLocaleString();
  footer.style.display = 'block';
}

function toggleCart() {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function checkout() {
  const subtotal = cart.reduce((s,x) => s + x.price * x.qty, 0);
  alert(`✅ Order placed!\nTotal: ₹${subtotal.toLocaleString()}\n\nThank you for shopping with MOVA!`);
  cart = [];
  updateCartUI();
  toggleCart();
}

// Init
renderProducts();
</script>
</body>
</html>
